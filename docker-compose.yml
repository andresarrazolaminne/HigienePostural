# Stack local = mismo que Lightsail (nginx + api, mismo origen en :8080).
#
#   copy .env.example .env   (SECRET_KEY distinto de OPENAI_API_KEY)
#   .\docker-local.bat
#
# App:     http://localhost:${WEB_PORT:-9080}  (9080 evita conflicto con otros servicios en 8080)
# API directa (debug): http://localhost:9081/health

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    env_file: .env
    environment:
      ENVIRONMENT: production
      UPLOAD_DIR: /data/uploads
      CORS_ORIGINS: http://localhost:${WEB_PORT:-9080},http://127.0.0.1:${WEB_PORT:-9080},http://localhost:5173,http://127.0.0.1:5173
      STORAGE_BACKEND: local
      RUN_SEED: ${RUN_SEED:-1}
    volumes:
      - hp_data:/data
    ports:
      - "9081:8080"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/health')",
        ]
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 90s
    restart: unless-stopped

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ""
        VITE_BASE: "/"
    ports:
      - "${WEB_PORT:-9080}:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  hp_data:
